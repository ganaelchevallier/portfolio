<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work — Ganaël Chevallier</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400&family=DM+Mono:wght@0,300;0,400&display=swap" rel="stylesheet">

  <style>
    /* ─── VARIABLES ──────────────────────────────────────── */
    :root {
      --black:    #080808;
      --ink:      #111111;
      --charcoal: #1C1C1C;
      --smoke:    #2E2E2E;
      --silver:   #9A9A9A;
      --offwhite: #E8E4DC;
      --cream:    #F5F0E8;
      --gold:     #B8983A;
      --gold-lt:  #D4AF50;
      --mist:     #5A5A5A;
    }

    /* ─── RESET ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: var(--offwhite);
      font-family: 'DM Mono', monospace;
      font-weight: 300;
      overflow-x: hidden;
    }

    ::selection { background: var(--gold); color: var(--black); }

    /* ─── GRAIN OVERLAY ──────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
      opacity: 0.35;
    }

    /* ─── WRAPPER ────────────────────────────────────────── */
    .site-wrap {
      max-width: 1380px;
      margin: 0 auto;
      background: var(--black);
      box-shadow: 0 0 60px rgba(0,0,0,0.8);
      min-height: 100vh;
    }

    /* ─── NAV ────────────────────────────────────────────── */
    nav {
      position: sticky;
      top: 0;
      z-index: 200;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 48px;
      background: rgba(8,8,8,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--charcoal);
    }

    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--offwhite);
      text-decoration: none;
    }

    /* ─── NAV MENU OVERLAY ───────────────────────────────── */
    .nav-menu {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(8,8,8,0.97);
      z-index: 500;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
    }

    .nav-menu.open { display: flex; }

    .nav-menu a {
      font-size: 13px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--silver);
      text-decoration: none;
      transition: color 0.25s;
    }

    .nav-menu a:hover,
    .nav-menu a.active { color: var(--gold-lt); }

    .nav-menu-close {
      position: absolute;
      top: 20px;
      right: 24px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .nav-menu-close span {
      display: block;
      width: 22px;
      height: 1.5px;
      background: var(--offwhite);
      transition: all 0.28s;
    }

    .nav-menu-close span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .nav-menu-close span:nth-child(2) { opacity: 0; }
    .nav-menu-close span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

    .nav-burger {
      display: flex;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px;
    }

    .nav-burger span {
      display: block;
      width: 22px;
      height: 1.5px;
      background: var(--silver);
      transition: all 0.28s;
    }

    /* ─── PAGE HEADER ────────────────────────────────────── */
    .page-header {
      padding: 80px 48px 60px;
      border-bottom: 1px solid var(--charcoal);
    }

    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(36px, 5vw, 64px);
      font-weight: 300;
      color: var(--cream);
      line-height: 1;
      letter-spacing: 0.01em;
    }

    /* ─── VIDEO GRID ─────────────────────────────────────── */
    .videos-section {
      padding: 1px;
      background: #000;
    }

    .videos-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 1px;
      background: #000;
    }

    /* ─── CARD ───────────────────────────────────────────── */
    .video-card {
      position: relative;
      cursor: pointer;
      overflow: hidden;
      background: #000;
    }

    .thumb-wrap {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      overflow: hidden;
      background: #111;
    }

    .thumb-wrap img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      transition: transform 0.5s ease, filter 0.4s, opacity 0.3s;
      filter: brightness(0.88) saturate(0.85);
    }

    .video-card:hover .thumb-wrap img {
      transform: scale(1.05);
      filter: brightness(0.45) saturate(0.6);
    }

    .video-card.playing .thumb-wrap img { opacity: 0; pointer-events: none; }

    /* ─── PLAY OVERLAY ───────────────────────────────────── */
    .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 2;
    }

    .video-card:hover .play-overlay { opacity: 1; }
    .video-card.playing .play-overlay { display: none; }

    .play-btn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: 1.5px solid var(--gold);
      background: rgba(8,8,8,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      transition: transform 0.2s, background 0.2s;
    }

    .video-card:hover .play-btn {
      transform: scale(1.1);
      background: rgba(184,152,58,0.2);
    }

    .play-btn svg { margin-left: 3px; }

    /* ─── CARD IFRAME ────────────────────────────────────── */
    .card-iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: none;
      z-index: 1;
    }

    .video-card.playing .card-iframe { display: block; }

    /* ─── CARD CONTROLS ──────────────────────────────────── */
    .card-controls {
      position: absolute;
      top: 6px;
      right: 6px;
      display: none;
      gap: 4px;
      z-index: 10;
    }

    .video-card.playing .card-controls { display: flex; }

    .ctrl-btn {
      width: 28px;
      height: 28px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(8,8,8,0.82);
      color: var(--silver);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      text-decoration: none;
      flex-shrink: 0;
    }

    .ctrl-btn:hover {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(8,8,8,0.95);
    }

    /* ─── GOLD BOTTOM LINE ON HOVER ──────────────────────── */
    .video-card:not(.playing)::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--gold);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.4s ease;
      z-index: 3;
    }

    .video-card:not(.playing):hover::after { transform: scaleX(1); }

    /* ─── RESPONSIVE ─────────────────────────────────────── */
    @media (max-width: 1100px) { .videos-grid { grid-template-columns: repeat(4, 1fr); } }
    @media (max-width: 900px) {
      nav          { padding: 20px 24px; }
      .page-header { padding: 64px 24px 48px; }
    }
    @media (max-width: 800px)  { .videos-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 600px) {
      nav            { padding: 16px 20px; }
      .page-header   { padding: 56px 20px 40px; }
      .videos-grid   { grid-template-columns: repeat(2, 1fr); }
      .ctrl-btn      { width: 40px; height: 40px; }
    }
    @media (max-width: 400px) {
      .videos-grid   { grid-template-columns: 1fr 1fr; }
      .page-title    { font-size: clamp(32px, 10vw, 48px); }
    }

    /* ─── TOUCH : afficher le play overlay au tap ──────── */
    @media (hover: none) {
      .video-card:active .play-overlay { opacity: 1; }
      .video-card:active .thumb-wrap img {
        filter: brightness(0.45) saturate(0.6);
      }
    }
  </style>
</head>

<body>

  <!-- ─── NAV ────────────────────────────────────────────── -->
  <nav>
    <a href="index.html" class="nav-logo">Home</a>

</div>

    'exV1GCDvxQ4',  // 2021/10 · Qatar | Experience a World Beyond
    'PH68kWX7hLk',  // 2021/09 · MINCE ALORS 2 | Bande Annonce
    'TU-9_6l1xkM',  // 2021/08 · Prada | Luna Rossa Ocean
    'EBJtqnKy1Ls',  // 2021/05 · ROBUSTE | Bande Annonce
    'YXAes9ii0Aw',  // 2021/02 · Societe Generale | stands by its 175,000 business clients
    // ── 2020 ──────────────────────────────────────────────────────
    '6tCWBlSttVw',  // 2020/07 · Vittel | Source naturelle de vitalité
    'JJR13qs6aHY',  // 2020/06 · Futuroscope | Objectif Mars
    'B94mNfn6IUs',  // 2020/03 · INTO THE NIGHT | Bande Annonce
    'P9nBzYbZ4uM',  // 2020/01 · DIESEL SS20 | For Successful Living

    'mWl33-IdOng',  // 2019/11 · DICK'S Sporting | The New Kid
    // ── 2018 ──────────────────────────────────────────────────────

    'lLmNL1I_QYU',  // 2017/11 · SEVEN & ME | Opening
    'wj257x8ntBo',  // 2017/06 · Duracell | Cars 3

    'jgCFy7kl9T8',  // 2009/01 · ARTHUR ET LA VENGEANCE DE MALTAZARD | Bande Annonce

    '41EFHlCWpnk',  // 2008/06 · BABYLON A.D. | Theatrical Trailer
    'RBkXxMhc3kk',  // 2008/04 · SPEED RACER | Bande Annonce
    // ── 2007 ──────────────────────────────────────────────────────
    'khf1mj9gkqk',  // 2007/11 · ASTERIX AT THE OLYMPIC GAMES | Bande Annonce
    '6KVsyZHKtRY',  // 2007/10 · Nissan | Rogue
  ];

  // ─── URL helpers ────────────────────────────────────────────
  const thumb  = id => `https://img.youtube.com/vi/${id}/mqdefault.jpg`;
  const embed  = id => `https://www.youtube-nocookie.com/embed/${id}?autoplay=1&rel=0&modestbranding=1`;
  const ytLink = id => `https://www.youtube.com/watch?v=${id}`;

  // ─── État ───────────────────────────────────────────────────
  let activeCard = null;

  function closeCard(card) {
    card.querySelector('.card-iframe').src = '';
    card.classList.remove('playing');
  }

  // ─── Construction de la grille ──────────────────────────────
  const grid = document.getElementById('grid');

  V.forEach(id => {
    const card = document.createElement('div');
    card.className = 'video-card';
    card.innerHTML = `
      <div class="thumb-wrap">
        <img src="${thumb(id)}" alt="" loading="lazy" decoding="async" width="320" height="180">
        <div class="play-overlay">
          <div class="play-btn">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M3 2l9 5-9 5V2z" fill="var(--gold)"/>
            </svg>
          </div>
        </div>
        <iframe class="card-iframe" allow="autoplay;encrypted-media;picture-in-picture" allowfullscreen></iframe>
        <div class="card-controls">
          <a class="ctrl-btn" href="${ytLink(id)}" target="_blank" rel="noopener" title="YouTube"
             onclick="event.stopPropagation()">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
              <path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8zM9.8 15.5V8.5l6.2 3.5-6.2 3.5z"/>
            </svg>
          </a>
          <button class="ctrl-btn" title="Fermer"
                  onclick="event.stopPropagation(); closeCard(this.closest('.video-card'))">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
              <path d="M1 1l8 8M9 1L1 9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      </div>`;

    card.addEventListener('click', () => {
      if (card.classList.contains('playing')) return;
      if (activeCard && activeCard !== card) closeCard(activeCard);
      card.querySelector('.card-iframe').src = embed(id);
      card.classList.add('playing');
      activeCard = card;
    });

    grid.appendChild(card);
  });

  // ─── Burger menu ────────────────────────────────────────────
  const burger = document.getElementById('burger');
  const menu   = document.getElementById('nav-menu');

  burger.addEventListener('click', () => menu.classList.add('open'));
  menu.addEventListener('click', e => {
    if (e.target === menu || e.target.tagName === 'A' || e.target.closest('.nav-menu-close')) {
      menu.classList.remove('open');
    }
  });
</script>
