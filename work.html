  <style>
    /* ─── VARIABLES ──────────────────────────────────────── */
    :root {
      --black:    #080808;
      --ink:      #111111;
      --charcoal: #1C1C1C;
      --smoke:    #2E2E2E;
      --silver:   #9A9A9A;
      --offwhite: #E8E4DC;
      --cream:    #F5F0E8;
      --gold:     #B8983A;
      --gold-lt:  #D4AF50;
      --mist:     #5A5A5A;
    }

    /* ─── RESET ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: var(--offwhite);
      font-family: 'DM Mono', monospace;
      font-weight: 300;
      overflow-x: hidden;
    }

    ::selection { background: var(--gold); color: var(--black); }

    /* ─── GRAIN OVERLAY ──────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
      opacity: 0.35;
    }

    /* ─── WRAPPER ────────────────────────────────────────── */
    .site-wrap {
      max-width: 1600px;
      margin: 0 auto;
      background: var(--black);
      box-shadow: 0 0 60px rgba(0,0,0,0.8);
      min-height: 100vh;
    }

    html { scroll-behavior: smooth; scroll-padding-top: 56px; }

    /* ─── NAV ────────────────────────────────────────────── */
    nav {
      position: sticky;
      top: 0;
      z-index: 200;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 0 24px;
      background: rgba(8,8,8,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--charcoal);
    }

    .nav-link {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--offwhite);
      text-decoration: none;
      padding: 22px 16px;
      transition: color 0.25s;
      white-space: nowrap;
    }

    .nav-link:hover  { color: var(--gold-lt); }
    .nav-link.active { color: var(--gold); }

    /* ─── PAGE HEADER ────────────────────────────────────── */
    .page-header {
      padding: 80px 48px 60px;
      border-bottom: 1px solid var(--charcoal);
    }

    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(36px, 5vw, 64px);
      font-weight: 300;
      color: var(--cream);
      line-height: 1;
      letter-spacing: 0.01em;
    }

    /* ─── VIDEO GRID ─────────────────────────────────────── */
    .videos-section {
      padding: 1px;
      background: #000;
    }

    .videos-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 1px;
      background: #000;
    }

    /* ─── CARD ───────────────────────────────────────────── */
    .video-card {
      position: relative;
      cursor: pointer;
      overflow: hidden;
      background: #000;
    }

    .thumb-wrap {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      overflow: hidden;
      background: #111;
    }

    .thumb-wrap img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      transition: transform 0.5s ease, filter 0.4s, opacity 0.3s;
      filter: brightness(0.88) saturate(0.85);
    }

    .video-card:hover .thumb-wrap img {
      transform: scale(1.05);
      filter: brightness(0.45) saturate(0.6);
    }

    .video-card.playing .thumb-wrap img { opacity: 0; pointer-events: none; }

    /* ─── PLAY OVERLAY ───────────────────────────────────── */
    .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 2;
    }

    .video-card:hover .play-overlay { opacity: 1; }
    .video-card.playing .play-overlay { display: none; }

    .play-btn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: 1.5px solid var(--gold);
      background: rgba(8,8,8,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      transition: transform 0.2s, background 0.2s;
    }

    .video-card:hover .play-btn {
      transform: scale(1.1);
      background: rgba(184,152,58,0.2);
    }

    .play-btn svg { margin-left: 3px; }

    /* ─── CARD IFRAME ────────────────────────────────────── */
    .card-iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: none;
      z-index: 1;
    }

    .video-card.playing .card-iframe { display: block; }

    /* ─── CARD CONTROLS ──────────────────────────────────── */
    .card-controls {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 10;
      opacity: 1;
      transition: opacity 0.12s ease;
    }

    .video-card.playing .card-controls { display: flex; }

    /* État lecture  → seul Pause visible */
    .card-controls [data-cmd="playVideo"]  { display: none; }
    .card-controls [data-cmd="pauseVideo"] { display: flex; }
    /* État pause    → seul Play visible  */
    .card-controls.paused [data-cmd="pauseVideo"] { display: none; }
    .card-controls.paused [data-cmd="playVideo"]  { display: flex; }

    .card-controls.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* Capte les mouvements souris par-dessus l'iframe */
    .mouse-catcher {
      position: absolute;
      inset: 0;
      z-index: 5;
      display: none;
      cursor: default;
    }
    .video-card.playing .mouse-catcher { display: block; }

    .ctrl-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 1.5px solid var(--gold);
      background: rgba(8,8,8,0.7);
      color: var(--offwhite);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      transition: transform 0.2s, background 0.2s;
      flex-shrink: 0;
      padding: 0;
    }

    .ctrl-btn:hover {
      transform: scale(1.1);
      background: rgba(184,152,58,0.2);
    }

    .ctrl-btn svg { display: block; }

    /* ─── GOLD BOTTOM LINE ON HOVER ──────────────────────── */
    .video-card:not(.playing)::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--gold);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.4s ease;
      z-index: 3;
    }

    .video-card:not(.playing):hover::after { transform: scaleX(1); }

    /* ─── RESPONSIVE ─────────────────────────────────────── */
    @media (max-width: 1100px) { .videos-grid { grid-template-columns: repeat(4, 1fr); } }
    @media (max-width: 900px)  {
      nav       { padding: 0 4px; }
      .nav-link { padding: 20px 6px; font-size: 11px; letter-spacing: 0.2em; }
      .videos-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 600px)  {
      .nav-link { padding: 18px 4px; font-size: 10px; letter-spacing: 0.1em; }
      .videos-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>

  // ─── URL helpers ────────────────────────────────────────────
  const thumb  = id => `https://img.youtube.com/vi/${id}/mqdefault.jpg`;
  const embed  = id => `https://www.youtube-nocookie.com/embed/${id}?autoplay=1&rel=0&modestbranding=1&enablejsapi=1`;

  // ─── Commandes postMessage vers l'iframe YT ─────────────────
  const ytCmd = (iframe, fn) =>
    iframe.contentWindow?.postMessage(JSON.stringify({ event: 'command', func: fn, args: [] }), '*');

  // ─── État global ────────────────────────────────────────────
  let activeCard = null;

  function closeCard(card) {
    const iframe = card.querySelector('.card-iframe');
    if (iframe) iframe.src = '';
    card.classList.remove('playing');
    if (activeCard === card) activeCard = null;
  }

  // ─── Construction de la grille ──────────────────────────────
  const grid = document.getElementById('grid');

  V.forEach(id => {
    const card = document.createElement('div');
    card.className = 'video-card';
    card.innerHTML = `
      <div class="thumb-wrap">
        <img src="${thumb(id)}" alt="" loading="lazy" decoding="async" width="320" height="180">
        <div class="play-overlay">
          <div class="play-btn">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M3 2l9 5-9 5V2z" fill="var(--gold)"/>
            </svg>
          </div>
        </div>
        <iframe class="card-iframe" allow="autoplay" allowfullscreen></iframe>
        <div class="mouse-catcher"></div>
        <div class="card-controls">
          <button class="ctrl-btn" data-cmd="playVideo" title="Play">
            <svg width="18" height="18" viewBox="0 0 10 10" fill="currentColor" style="margin-left:2px">
              <path d="M2 1.5l7 3.5-7 3.5V1.5z"/>
            </svg>
          </button>
          <button class="ctrl-btn" data-cmd="pauseVideo" title="Pause">
            <svg width="18" height="18" viewBox="0 0 10 10" fill="currentColor">
              <rect x="1.5" y="1.5" width="2.5" height="7" rx="0.5"/>
              <rect x="6"   y="1.5" width="2.5" height="7" rx="0.5"/>
            </svg>
          </button>
        </div>
      </div>`;

    const iframe   = card.querySelector('.card-iframe');
    const controls = card.querySelector('.card-controls');
    const catcher  = card.querySelector('.mouse-catcher');
    let   hideTimer = null;

    function showControls() {
      controls.classList.remove('hidden');
      clearTimeout(hideTimer);
      hideTimer = setTimeout(() => controls.classList.add('hidden'), 100);
    }

    catcher.addEventListener('mousemove', showControls);
    controls.addEventListener('mouseenter', () => { clearTimeout(hideTimer); controls.classList.remove('hidden'); });
    controls.addEventListener('mouseleave', showControls);
    card.addEventListener('mouseleave', () => { clearTimeout(hideTimer); controls.classList.add('hidden'); });

    controls.querySelectorAll('.ctrl-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        ytCmd(iframe, btn.dataset.cmd);
        controls.classList.toggle('paused', btn.dataset.cmd === 'pauseVideo');
      });
    });

    card.addEventListener('click', () => {
      if (card.classList.contains('playing')) return;
      if (activeCard && activeCard !== card) closeCard(activeCard);
      iframe.src = embed(id);
      card.classList.add('playing');
      controls.classList.remove('paused');
      activeCard = card;
      showControls();
    });

    grid.appendChild(card);
  });

</script>
