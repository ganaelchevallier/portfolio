<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work — Ganaël Chevallier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400&family=DM+Mono:wght@0,300;0,400&display=swap" rel="stylesheet">

<style>
  :root {
    --black:    #080808;
    --ink:      #111111;
    --charcoal: #1C1C1C;
    --smoke:    #2E2E2E;
    --silver:   #9A9A9A;
    --offwhite: #E8E4DC;
    --cream:    #F5F0E8;
    --gold:     #B8983A;
    --gold-lt:  #D4AF50;
    --mist:     #5A5A5A;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #000;           /* le noir des lisérets */
    color: var(--offwhite);
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.35;
  }

  .site-wrap {
    max-width: 1380px;
    margin: 0 auto;
    background: var(--black);
    box-shadow: 0 0 60px rgba(0,0,0,0.8);
    min-height: 100vh;
  }

  ::selection { background: var(--gold); color: var(--black); }

  /* ─── NAV ─────────────────────────────────────────── */
  nav {
    position: sticky;
    top: 0;
    z-index: 200;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 48px;
    background: rgba(8,8,8,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--charcoal);
  }

  .nav-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    font-weight: 400;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--offwhite);
    text-decoration: none;
  }




  /* ─── PAGE HEADER ─────────────────────────────────── */
  .page-header {
    padding: 80px 48px 60px;
    border-bottom: 1px solid var(--charcoal);
  }

  .page-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(36px, 5vw, 64px);
    font-weight: 300;
    color: var(--cream);
    line-height: 1;
    letter-spacing: 0.01em;
  }

  /* ─── GRID ────────────────────────────────────────── */
  .videos-section {
    padding: 1px;          /* crée le liséret extérieur */
    background: #000;
  }

  .videos-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 1px;              /* liséret noir 1px entre chaque vignette */
    background: #000;      /* la couleur du liséret */
  }

  /* ─── CARD ────────────────────────────────────────── */
  .video-card {
    position: relative;
    cursor: pointer;
    overflow: hidden;
    background: #000;
  }

  /* Ratio 16/9 */
  .thumb-wrap {
    position: relative;
    width: 100%;
    padding-top: 56.25%;
    overflow: hidden;
    background: #111;
  }

  /* ── THUMBNAIL ── */
  .thumb-wrap img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    transition: transform 0.5s ease, filter 0.4s, opacity 0.3s;
    filter: brightness(0.88) saturate(0.85);
  }

  .video-card:hover .thumb-wrap img {
    transform: scale(1.05);
    filter: brightness(0.45) saturate(0.6);
  }

  /* masqué quand la vidéo joue */
  .video-card.playing .thumb-wrap img { opacity: 0; pointer-events: none; }

  /* ── PLAY OVERLAY ── */
  .play-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 2;
  }

  .video-card:hover .play-overlay { opacity: 1; }
  .video-card.playing .play-overlay { display: none; }

  .play-btn {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    border: 1.5px solid var(--gold);
    background: rgba(8,8,8,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
    transition: transform 0.2s, background 0.2s;
  }

  .video-card:hover .play-btn {
    transform: scale(1.1);
    background: rgba(184,152,58,0.2);
  }

  .play-btn svg { margin-left: 3px; }

  /* ── IFRAME (inline, même taille que la vignette) ── */
  .card-iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    display: none;
    z-index: 1;
  }

  .video-card.playing .card-iframe { display: block; }

  /* ── CONTRÔLES (visibles quand la vidéo joue) ── */
  .card-controls {
    position: absolute;
    top: 6px;
    right: 6px;
    display: none;
    gap: 4px;
    z-index: 10;
  }

  .video-card.playing .card-controls { display: flex; }

  .ctrl-btn {
    width: 28px;
    height: 28px;
    border: 1px solid rgba(255,255,255,0.18);
    background: rgba(8,8,8,0.82);
    color: var(--silver);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(6px);
    transition: border-color 0.2s, color 0.2s, background 0.2s;
    text-decoration: none;
    flex-shrink: 0;
  }

  .ctrl-btn:hover {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(8,8,8,0.95);
  }

  /* gold bottom line au hover (seulement en mode vignette) */
  .video-card:not(.playing)::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--gold);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.4s ease;
    z-index: 3;
  }

  .video-card:not(.playing):hover::after { transform: scaleX(1); }

  /* ─── RESPONSIVE ──────────────────────────────────── */
  @media (max-width: 1100px) { .videos-grid { grid-template-columns: repeat(4, 1fr); } }
  @media (max-width: 800px)  { .videos-grid { grid-template-columns: repeat(2, 1fr); } }

  /* ─── MENU OVERLAY ────────────────────────────────── */
  .nav-menu {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(8,8,8,0.97);
    z-index: 500;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
  }
  .nav-menu.open { display: flex; }
  .nav-menu a {
    font-size: 13px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--silver);
    text-decoration: none;
    transition: color 0.25s;
  }
  .nav-menu a:hover, .nav-menu a.active { color: var(--gold-lt); }
  .nav-menu-close {
    position: absolute;
    top: 20px; right: 24px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .nav-menu-close span {
    display: block;
    width: 22px;
    height: 1.5px;
    background: var(--offwhite);
    transition: all 0.28s;
  }
  .nav-menu-close span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
  .nav-menu-close span:nth-child(2) { opacity: 0; }
  .nav-menu-close span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }
  .nav-burger {
    display: flex;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 4px;
    z-index: 100;
  }
  .nav-burger span {
    display: block;
    width: 22px;
    height: 1.5px;
    background: var(--silver);
    transition: all 0.28s;
  }

</style>
</head>
<body>
<div class="site-wrap">

<nav>
  <a href="index.html" class="nav-logo">Home</a>
  <button class="nav-burger" id="burger" aria-label="Menu"><span></span><span></span><span></span></button>
</nav>
<div class="nav-menu" id="nav-menu">
  <button class="nav-menu-close" aria-label="Fermer"><span></span><span></span><span></span></button>
  <a href="index.html">Home</a>
  <a href="index.html#reels">Reels</a>
  <a href="index.html#cv">CV</a>
  <a href="work.html" class="active">Work</a>
  <a href="index.html#contact">Contact</a>
</div>

<div class="page-header">
  <h1 class="page-title">Work</h1>
</div>

<section class="videos-section">
  <div class="videos-grid" id="grid"></div>
</section>

</div>

<script>(()=>{const V=['U8gAgfimpzE','0UUYO-kGprA','sXJYNb4irSc','n6iY-0KgHnk','S0OO6ZAkE3c','ccqn7r9WUHI','0OFuueSEzeI','LDFkx2SxdOo','vqbjVZ1Nczk','XKWcAsT8Sqc','IGFL5cHcpbo','y64fItPkKVs','R59xb9vDDfE','-aEYoGF9uOE','exV1GCDvxQ4','TEaUIOQKAZw','K9kT526MfxA','TU-9_6l1xkM','eVDzNeL5ztM','Vh59SXy17Rw','IDW0PBLf9JQ','GZIQwOUTny4','6tCWBlSttVw','_m3PIkZW6o8','P9nBzYbZ4uM','YXAes9ii0Aw','mWl33-IdOng','wj257x8ntBo','Lg5KWEYs0YM','ZzIuV0d-cog','JJR13qs6aHY','lLmNL1I_QYU','t8sFlno9Fs0','5dvIuXj4Gm4'];const g=document.getElementById('grid');const TH=id=>`https://img.youtube.com/vi/${id}/mqdefault.jpg`;const EM=id=>`https://www.youtube-nocookie.com/embed/${id}?autoplay=1&rel=0&modestbranding=1`;const YT=id=>`https://www.youtube.com/watch?v=${id}`;let ac=null;V.forEach(id=>{const card=document.createElement('div');card.className='video-card';card.innerHTML=`<div class="thumb-wrap"><img src="${TH(id)}" alt="" loading="lazy" decoding="async" width="320" height="180"><div class="play-overlay"><div class="play-btn"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 2l9 5-9 5V2z" fill="var(--gold)"/></svg></div></div><iframe class="card-iframe" allow="autoplay;encrypted-media;picture-in-picture" allowfullscreen></iframe><div class="card-controls"><a class="ctrl-btn" href="${YT(id)}" target="_blank" rel="noopener" title="YouTube" onclick="event.stopPropagation()"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8zM9.8 15.5V8.5l6.2 3.5-6.2 3.5z"/></svg></a><button class="ctrl-btn" title="Fermer" onclick="event.stopPropagation();closeCard(this.closest('.video-card'))"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1 1l8 8M9 1L1 9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg></button></div></div>`;card.addEventListener('click',()=>{if(!card.classList.contains('playing')){if(ac&&ac!==card)closeCard(ac);card.querySelector('.card-iframe').src=EM(id);card.classList.add('playing');ac=card;}});g.appendChild(card);});})();function closeCard(card){card.querySelector('.card-iframe').src='';card.classList.remove('playing');}(()=>{  const burger=document.getElementById('burger');  const menu=document.getElementById('nav-menu');  const open=()=>menu.classList.add('open');  const close=()=>menu.classList.remove('open');  burger.addEventListener('click',open);  menu.addEventListener('click',e=>{if(e.target===menu||e.target.tagName==='A'||e.target.closest('.nav-menu-close'))close();});})();</script>
</body>
</html>
